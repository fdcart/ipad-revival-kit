<!doctype html><html><head><meta charset='utf-8'><title>To Do</title><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='../style.css'></head><body><main class='page'><a class='button' href='../index.html'>Back</a><h1>Quick To Do</h1><input id='task' placeholder='New task'><button onclick='add()'>Add</button><ul id='list'></ul></main><script>var todos=JSON.parse(localStorage.ir_todos||'[]');function save(){localStorage.ir_todos=JSON.stringify(todos)}function draw(){list.innerHTML=todos.map(function(t,i){return '<li><button onclick="done('+i+')">✓</button> '+t+'</li>'}).join('')}function add(){if(task.value){todos.push(task.value);task.value='';save();draw()}}function done(i){todos.splice(i,1);save();draw()}draw()</script></body></html>
