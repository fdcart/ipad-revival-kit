<!doctype html><html><head><meta charset='utf-8'><title>Links</title><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='../style.css'></head><body><main class='page'><a class='button' href='../index.html'>Back</a><h1>Links</h1><input id='u'><button onclick='a()'>Add</button><ul id='l'></ul></main><script>var links=JSON.parse(localStorage.ir_links||'[]');function draw(){l.innerHTML=links.map(x=>'<li><a href="'+x+'">'+x+'</a></li>').join('')}function a(){links.push(u.value);localStorage.ir_links=JSON.stringify(links);draw()}draw()</script></body></html>
