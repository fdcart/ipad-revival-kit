<!doctype html><html><head><meta charset='utf-8'><title>Snake</title><meta name='viewport' content='width=device-width,initial-scale=1'></head><body><canvas id='c'></canvas><script>var c=document.getElementById('c'),ctx=c.getContext('2d');c.width=300;c.height=300;var x=150,y=150,dx=10,dy=0;document.onkeydown=e=>{if(e.keyCode==37)dx=-10,dy=0;if(e.keyCode==38)dx=0,dy=-10;if(e.keyCode==39)dx=10,dy=0;if(e.keyCode==40)dx=0,dy=10};function draw(){ctx.fillRect(0,0,300,300);ctx.fillStyle='white';ctx.fillRect(x,y,10,10);x+=dx;y+=dy}setInterval(draw,100)</script></body></html>
