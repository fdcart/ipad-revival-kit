<!doctype html><html><head><meta charset='utf-8'><title>Pomodoro</title><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='../style.css'></head><body style='display:flex;align-items:center;justify-content:center;height:100vh;font-size:50px'><div id='t'></div><script>var s=1500;function tick(){var m=Math.floor(s/60),sec=s%60;t.innerText=m+':'+(sec<10?'0'+sec:sec);if(s>0)s--}setInterval(tick,1000);tick()</script></body></html>
